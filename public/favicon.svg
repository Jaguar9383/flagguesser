<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0e4d6e"/>

  <!-- Globe base -->
  <circle cx="32" cy="32" r="22" fill="#1a8fa8" stroke="#0e4d6e" stroke-width="1.5"/>

  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="22" ry="8" fill="none" stroke="#ffffff30" stroke-width="1"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#ffffff30" stroke-width="1"/>
  <ellipse cx="32" cy="22" rx="18" ry="5" fill="none" stroke="#ffffff22" stroke-width="0.8"/>
  <ellipse cx="32" cy="42" rx="18" ry="5" fill="none" stroke="#ffffff22" stroke-width="0.8"/>

  <!-- Longitude arc -->
  <ellipse cx="32" cy="32" rx="10" ry="22" fill="none" stroke="#ffffff30" stroke-width="1"/>

  <!-- Flag pole -->
  <line x1="32" y1="13" x2="32" y2="28" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- Flag (3 stripes) -->
  <rect x="32" y="13" width="15" height="4" rx="1" fill="#e94560"/>
  <rect x="32" y="17" width="15" height="4" fill="#ffffff"/>
  <rect x="32" y="21" width="15" height="4" rx="1" fill="#e94560"/>
</svg>
